services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ithildin-data:/data
    environment:
      - DATABASE_PATH=/data/ithildin.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      - NODE_ENV=production
      - DATA_DIR=/data
      - PORT=3000
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  ithildin-data:
  caddy-data:
  caddy-config:
